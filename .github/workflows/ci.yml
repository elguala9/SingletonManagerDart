name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos get

      - name: Analyze code
        run: melos run analyze:strict

      - name: Check formatting
        run: melos run format:check

  test:
    name: Test on ${{ matrix.os }} (Dart ${{ matrix.sdk }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        sdk: [stable, beta]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos get

      - name: Run tests
        run: melos run test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Install coverage tools
        run: dart pub global activate coverage

      - name: Get dependencies
        run: melos get

      - name: Generate coverage
        run: melos run test:coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./packages/singleton_manager_test/coverage
          fail_ci_if_error: false
