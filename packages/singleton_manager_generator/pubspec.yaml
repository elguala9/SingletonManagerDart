name: singleton_manager_generator
description: >
  CLI tool that generates Dart augmentation files for @isSingleton classes.
  Automatically creates ISingletonStandardDI.initializeDI() implementations
  from @isInjected field annotations.

version: 0.1.5

resolution: workspace

repository: https://github.com/elguala9/SingletonManagerDart
homepage: https://github.com/elguala9/SingletonManagerDart
issue_tracker: https://github.com/elguala9/SingletonManagerDart/issues

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  args: ^2.5.0
  analyzer: ^10.0.0
  path: ^1.9.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
  singleton_manager: ^0.4.0

executables:
  singleton_manager_generator: singleton_manager_generator
