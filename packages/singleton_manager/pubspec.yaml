name: singleton_manager
description: >
  A high-performance singleton manager for Dart with zero dependencies,
  type-safe generics support, lazy loading, and optional scope management.
  Ideal for dependency injection, service locators, and resource management.

version: 0.3.2

resolution: workspace

repository: https://github.com/elguala9/SingletonManagerDart
homepage: https://github.com/elguala9/SingletonManagerDart
issue_tracker: https://github.com/elguala9/SingletonManagerDart/issues
documentation: https://pub.dev/documentation/singleton_manager/latest/

topics:
  - singleton
  - pattern
  - dependency-injection
  - service-locator
  - resource-management

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies: 
  index_generator: 4.1.2

dev_dependencies:
  lints: ^5.1.0
  test: ^1.24.0

index_generator:
  exclude:
    - "**/test/**"
  libraries:
    - directory_path: lib